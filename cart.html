<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<style>
body{
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1{
    color:#FFD700;
}
.box{
    max-width:700px;
    margin:auto;
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
}
#cartItems{
    margin:20px 0;
    text-align:left;
}
button{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>🛒 Your Cart</h1>

<div id="cartItems">

</div>

<h2>Total: ₹<span id="total">0</span></h2>

<form>
<button id="payBtn">
    Proceed To Payment
</button>
    <br><br>

<button onclick="clearCart()" style="background:red;color:white;">
Clear Cart
</button>
</div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    const cart = document.getElementById("cartItems");
const total = document.getElementById("total");
const cartData = JSON.parse(localStorage.getItem("cart")) || [];

let totalPrice = 0;
cart.innerHTML = "";

cartData.forEach(item => {

    cart.innerHTML += `
    <div style="margin-bottom:15px;border-bottom:1px solid #555;padding:10px;">

        <h3>${item.name}</h3>

        <button onclick="changeQty('${item.name}',-1)">-</button>

        <b> ${item.quantity} </b>

        <button onclick="changeQty('${item.name}',1)">+</button>

        <span style="float:right;">₹${item.price * item.quantity}</span>

    </div>
    `;

    totalPrice += item.price * item.quantity;

});
total.textContent = totalPrice;
function changeQty(name, change) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let item = cart.find(i => i.name === name);

    if (!item) return;

    item.quantity += change;

    if (item.quantity <= 0) {
        cart = cart.filter(i => i.name !== name);
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    location.reload();
}

</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <script>
document.getElementById("payBtn").onclick = function (e) {
    e.preventDefault();
    var options = {
        key: "rzp_live_T7XO0cl4FGTqId",
     amount: totalPrice * 100,
        currency: "INR",
        name: "LearnFast",
        description: "eBook Purchase",

    handler: function (response) {

    localStorage.setItem("totalPrice", totalPrice);
    localStorage.setItem("paymentId", response.razorpay_payment_id);
    window.location.href = "success.html";

}
          var rzp = new Razorpay(options);
    rzp.open();

};
function clearCart() {
    localStorage.removeItem("cart");
    location.reload();
}        
window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
        location.reload();
    }
});
</script>
</body>
</html>
