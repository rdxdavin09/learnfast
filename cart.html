<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LearnFast | Your Cart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(-45deg,
#0f0c29,
#302b63,
#24243e,
#1b1464);

background-size:400% 400%;
animation:bgMove 12s ease infinite;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:40px;

overflow-x:hidden;

color:white;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

body::before{

content:"";

position:fixed;

width:500px;
height:500px;

background:#7b2ff7;

filter:blur(180px);

left:-150px;
top:-150px;

opacity:.35;

animation:float1 10s infinite alternate;

}

body::after{

content:"";

position:fixed;

width:450px;
height:450px;

background:#00c6ff;

filter:blur(180px);

right:-150px;
bottom:-150px;

opacity:.35;

animation:float2 10s infinite alternate;

}

@keyframes float1{

from{transform:translateY(0);}
to{transform:translateY(80px);}

}

@keyframes float2{

from{transform:translateY(0);}
to{transform:translateY(-80px);}

}

.container{

width:100%;
max-width:1050px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

border-radius:30px;

padding:40px;

box-shadow:
0 20px 60px rgba(0,0,0,.45);

animation:appear .8s ease;

position:relative;

z-index:5;

}

@keyframes appear{

from{
opacity:0;
transform:translateY(30px);
}

to{

opacity:1;
transform:translateY(0);

}

}

.title{

text-align:center;
margin-bottom:35px;

}

.title h1{

font-size:48px;
font-weight:700;

background:linear-gradient(90deg,#ffffff,#9d7dff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.title p{

margin-top:10px;
color:#d6d6d6;

font-size:17px;

}

.cartBox{

background:rgba(255,255,255,.05);

border-radius:25px;

padding:25px;

border:1px solid rgba(255,255,255,.08);

}

.cartHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.cartHeader h2{

font-size:30px;

}

.itemCount{

background:#7b2ff7;

padding:8px 18px;

border-radius:30px;

font-weight:600;

}

#cartItems{

display:flex;

flex-direction:column;

gap:18px;

}
.cartItem{

display:flex;

align-items:center;

justify-content:space-between;

gap:20px;

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

transition:.35s;

}

.cartItem:hover{

transform:translateY(-4px);

box-shadow:0 0 25px rgba(123,47,247,.35);

}

.bookLeft{

display:flex;

align-items:center;

gap:18px;

}

.bookImage{

width:80px;

height:110px;

border-radius:12px;

object-fit:cover;

box-shadow:0 0 15px rgba(255,255,255,.15);

}

.bookInfo h3{

font-size:22px;

margin-bottom:8px;

}

.bookInfo p{

color:#38ef7d;

font-size:20px;

font-weight:600;

}

.qtyBox{

display:flex;

align-items:center;

gap:12px;

}

.qtyBtn{

width:42px;

height:42px;

border:none;

border-radius:10px;

font-size:22px;

cursor:pointer;

transition:.3s;

font-weight:bold;

color:white;

}

.minus{

background:#ff3b3b;

}

.plus{

background:#00d26a;

}

.qtyBtn:hover{

transform:scale(1.08);

}

.qty{

font-size:22px;

font-weight:bold;

width:35px;

text-align:center;

}

.itemPrice{

font-size:28px;

font-weight:700;

color:#ffffff;

}

.totalCard{

margin-top:35px;

display:flex;

justify-content:space-between;

align-items:center;

padding:25px;

border-radius:22px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

}

.totalText h3{

font-size:20px;

color:#cccccc;

margin-bottom:8px;

}

.totalText h1{

font-size:42px;

color:#38ef7d;

text-shadow:0 0 15px #38ef7d;

}

.secure{

text-align:right;

}

.secure h3{

font-size:22px;

margin-bottom:8px;

}

.secure p{

color:#cccccc;

}

.payBtn{

width:100%;

margin-top:30px;

padding:22px;

font-size:24px;

font-weight:bold;

border:none;

border-radius:18px;

cursor:pointer;

background:linear-gradient(90deg,#246bfd,#b721ff);

color:white;

transition:.35s;

box-shadow:0 0 30px rgba(120,0,255,.45);

}

.payBtn:hover{

transform:translateY(-3px);

box-shadow:0 0 45px rgba(120,0,255,.7);

}

.clearBtn{

width:100%;

margin-top:18px;

padding:20px;

font-size:22px;

background:transparent;

border:2px solid #ff4b5c;

color:#ff4b5c;

border-radius:18px;

cursor:pointer;

transition:.35s;

}

.clearBtn:hover{

background:#ff4b5c;

color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="title">

<h1>🛒 Your Cart</h1>

<p>Review your selected books and proceed to checkout</p>

</div>

<div class="cartBox">

<div class="cartHeader">

<h2>📚 Cart Items</h2>

<div class="itemCount">

<span id="itemCount">0</span> Items

</div>

</div>

<div id="cartItems">

</div>

<div class="totalCard">

<div class="totalText">

<h3>Total Amount</h3>

<h1>₹<span id="totalPrice">0</span></h1>

</div>

<div class="secure">

<h3>🔒 Secure Checkout</h3>

<p>100% Safe & Secure</p>

</div>

</div>

<button id="payBtn" class="payBtn">

Proceed To Payment →

</button>

<button class="clearBtn" onclick="clearCart()">

Clear Cart

</button>

</div>

<script>
    const cartContainer = document.getElementById("cartItems");
const totalPrice = document.getElementById("totalPrice");
const itemCount = document.getElementById("itemCount");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {

    cartContainer.innerHTML = "";

    let total = 0;
    let count = 0;

    if(cart.length===0){

        cartContainer.innerHTML=`
        <div style="text-align:center;padding:60px;opacity:.7;">
            <h2>Your Cart is Empty 😔</h2>
            <p>Add some books to continue shopping.</p>
        </div>`;

        totalPrice.innerText=0;
        itemCount.innerText=0;
        return;
    }

    cart.forEach((item,index)=>{

        total+=item.price*item.quantity;
        count+=item.quantity;

        cartContainer.innerHTML+=`

<div class="cartItem">

<div class="bookLeft">

<img src="${item.image}" class="bookImage">

<div class="bookInfo">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

</div>

<div class="qtyBox">

<button class="qtyBtn minus" onclick="changeQty(${index},-1)">−</button>

<div class="qty">${item.quantity}</div>

<button class="qtyBtn plus" onclick="changeQty(${index},1)">+</button>

</div>

<div class="itemPrice">

₹${item.price*item.quantity}

</div>

</div>

`;

    });

    totalPrice.innerText=total;
    itemCount.innerText=count;

}

function changeQty(index,value){

    cart[index].quantity+=value;

    if(cart[index].quantity<=0){

        cart.splice(index,1);

    }

    localStorage.setItem("cart",JSON.stringify(cart));

    renderCart();

}

function clearCart(){

    if(confirm("Clear complete cart?")){

        localStorage.removeItem("cart");

        cart=[];

        renderCart();

    }

}

renderCart();
    // ============================
// Razorpay Payment
// ============================

document.getElementById("payBtn").onclick = async function (e) {

    e.preventDefault();

    if(cart.length===0){

        alert("Your cart is empty!");

        return;

    }

    try{

        const response = await fetch("http://localhost:5000/create-order",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                amount:Number(totalPrice.innerText)
            })

        });

        const order = await response.json();

        var options={

            key:"rzp_test_T8Ef5Ht4FPwfeA",

            amount:order.amount,

            currency:order.currency,

            name:"LearnFast",

            description:"Book Purchase",

            image:"logo.png",

            order_id:order.id,

            prefill:{

                name:"Davin"

            },

            theme:{
                color:"#7b2ff7"
            },

            handler:function(response){

                localStorage.setItem("paymentId",response.razorpay_payment_id);

                localStorage.setItem("orderId",order.id);

                localStorage.setItem("paymentTime",new Date().toLocaleString());

                localStorage.setItem("customerName","Davin");

                localStorage.setItem("totalPrice",totalPrice.innerText);

                window.location.href="success.html";

            }

        };

        const rzp=new Razorpay(options);

        rzp.open();

    }

    catch(err){

        console.log(err);

        alert("Unable to connect to payment server.");

    }

};

</script>

</body>

</html>
