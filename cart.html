<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<style>
body{
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1{
    color:#FFD700;
}
.box{
    max-width:700px;
    margin:auto;
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
}
#cartItems{
    margin:20px 0;
    text-align:left;
}
button{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>🛒 Your Cart</h1>

<div id="cartItems">

</div>

<h2>Total: ₹<span id="total">0</span></h2>

<button>
Proceed To Payment
</button>

</div>
<script>
const book = localStorage.getItem("cart");

const cart = document.getElementById("cartItems");
const total = document.getElementById("total");

if (book) {
    cart.innerHTML = book + " - ₹199";
    total.textContent = "199";
} else {
    cart.innerHTML = "No books added yet.";
    total.textContent = "0";
}
</script>
</body>
</html>
