<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<style>
body{
    background:#0d0d0d;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1{
    color:#FFD700;
}
.box{
    max-width:700px;
    margin:auto;
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
}
#cartItems{
    margin:20px 0;
    text-align:left;
}
button{
    background:#00c853;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>🛒 Your Cart</h1>

<div id="cartItems">

</div>

<h2>Total: ₹<span id="total">0</span></h2>

<form>
<button id="payBtn">
    Proceed To Payment
</button>
</div>
<script>
    const cart = document.getElementById("cartItems");
const total = document.getElementById("total");
const cartData = JSON.parse(localStorage.getItem("cart")) || [];

let totalPrice = 0;
cart.innerHTML = "";

cartData.forEach(item => {
    cart.innerHTML += `
        <p>${item.name} - ₹${item.price}</p>
    `;
    totalPrice += item.price;
});

total.textContent = totalPrice;


</script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</script>
    <script>
document.getElementById("payBtn").onclick = function (e) {
    e.preventDefault();
    var options = {
        key: "rzp_live_T7XO0cl4FGTqId",
        amount: 19900,
        currency: "INR",
        name: "LearnFast",
        description: "eBook Purchase",

        handler: function (response) {
            alert("Payment Successful!\nPayment ID: " + response.razorpay_payment_id);
        }
    };


    var rzp = new Razorpay(options);
    rzp.open();

};
</script>
</body>
</html>
